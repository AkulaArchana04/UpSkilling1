<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Local Community Event Portal</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        /* Navigation */

        nav {
            background-color: #333;
            padding: 20px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 20px;
            font-size: 20px;
            font-weight: bold;
        }

        nav a:hover {
            color: yellow;
        }

        /* Welcome Section */

        #welcomeBanner {
            background-color: lightblue;
            text-align: center;
            padding: 70px;
        }

        #welcomeBanner h1 {
            font-size: 55px;
            margin-bottom: 30px;
        }

        #welcomeBanner p {
            font-size: 28px;
            margin-bottom: 20px;
        }

        .offer {
            color: red;
            font-weight: bold;
            font-size: 30px;
        }

        /* Gallery */

        .gallery {
            padding: 40px;
        }

        .gallery h2 {
            font-size: 45px;
            margin-bottom: 30px;
        }

        table {
            width: 100%;
        }

        td {
            text-align: center;
            padding: 10px;
        }

        .event-img {
            width: 300px;
            height: 200px;
            border: 4px solid black;
            transition: 0.3s;
        }

        .event-img:hover {
            transform: scale(1.05);
        }

        /* Form */

        .form-section {
            padding: 40px;
        }

        .form-section h2 {
            font-size: 45px;
            margin-bottom: 20px;
        }

        form {
            background-color: white;
            padding: 30px;
            width: 500px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            font-size: 16px;
        }

        button {
            background-color: green;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkgreen;
        }

        #fee,
        #charCount,
        #location {
            font-weight: bold;
            color: blue;
            margin-bottom: 10px;
        }

        /* Video */

        .video-section {
            padding: 40px;
        }

        .video-section h2 {
            font-size: 45px;
            margin-bottom: 20px;
        }

        video {
            border: 5px solid black;
        }

        /* Footer */

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 30px;
            margin-top: 40px;
            font-size: 25px;
        }

    </style>

    <script>

        // Phone Validation

        function validatePhone() {

            let phone =
                document.getElementById("phone").value;

            if (phone.length != 10) {

                alert("Phone number must contain 10 digits");

            }
        }

        // Event Fee

        function showFee() {

            let type =
                document.getElementById("eventType").value;

            let fee = "";

            if (type == "Music") {

                fee = "₹500";

            }

            else if (type == "Sports") {

                fee = "₹300";

            }

            else if (type == "Workshop") {

                fee = "₹700";

            }

            document.getElementById("fee").innerHTML =
                "Event Fee: " + fee;

            localStorage.setItem("preferredEvent", type);
        }

        // Submit Form

        function confirmSubmit() {

            document.getElementById("outputMsg").value =
                "Registration Successful!";
        }

        // Double Click Image

        function enlargeImage(img) {

            img.style.width = "400px";

            img.style.height = "250px";
        }

        // Character Count

        function countChars() {

            let text =
                document.getElementById("feedback").value;

            document.getElementById("charCount").innerHTML =
                "Characters: " + text.length;
        }

        // Video Ready

        function videoReady() {

            alert("Video ready to play");
        }

        // Warning Before Leaving

        window.onbeforeunload = function () {

            return "Your form is not completed!";
        };

        // Geolocation

        function findLocation() {

            let options = {

                enableHighAccuracy: true,

                timeout: 5000
            };

            navigator.geolocation.getCurrentPosition(

                showPosition,

                showError,

                options
            );
        }

        function showPosition(position) {

            document.getElementById("location").innerHTML =

                "Latitude: " + position.coords.latitude +

                "<br>Longitude: " + position.coords.longitude;
        }

        function showError(error) {

            alert("Location access denied or timeout");
        }

        // Clear Storage

        function clearPreferences() {

            localStorage.clear();

            sessionStorage.clear();

            alert("Preferences Cleared");
        }

        // Load Saved Event

        window.onload = function () {

            let saved =
                localStorage.getItem("preferredEvent");

            if (saved) {

                document.getElementById("eventType").value =
                    saved;
            }
        }

    </script>

</head>

<body>

    <!-- Navigation -->

    <nav>

        <a href="#home">Home</a>

        <a href="#events">Event</a>

        <a href="#register">Register</a>

        <a href="#contact">Contact</a>

        <a href="help.html" target="_blank">Help</a>

    </nav>

    <!-- Welcome Banner -->

    <section id="home">

        <div id="welcomeBanner">

            <h1>
                Welcome to Local Community Event Portal

            </h1>

            <p>
                Join exciting community programs and activities.

            </p>

            <span class="offer">

                Special Offer: Free entry for first 50 registrations!
            </span>

        </div>

    </section>

    <!-- Event Gallery -->

    <section id="events" class="gallery">

        <h2>Event Gallery</h2>

        <table border="1">

            <tr>

                <td>

                    <img src="https://images.pexels.com/photos/167636/pexels-photo-167636.jpeg"

                        alt="Event 1"

                        title="Music Event"

                        class="event-img"

                        ondblclick="enlargeImage(this)">

                </td>

                <td>

                    <img src="https://images.pexels.com/photos/1190297/pexels-photo-1190297.jpeg"

                        alt="Event 2"

                        title="Sports Event"

                        class="event-img"

                        ondblclick="enlargeImage(this)">

                </td>

                <td>

                    <img src="https://images.pexels.com/photos/2747449/pexels-photo-2747449.jpeg"

                        alt="Event 3"

                        title="Workshop"

                        class="event-img"

                        ondblclick="enlargeImage(this)">

                </td>

            </tr>

            <tr>

                <td>

                    <img src="https://images.pexels.com/photos/1105666/pexels-photo-1105666.jpeg"

                        alt="Event 4"

                        title="Dance Event"

                        class="event-img"

                        ondblclick="enlargeImage(this)">

                </td>

                <td>

                    <img src="https://images.pexels.com/photos/587741/pexels-photo-587741.jpeg"

                        alt="Event 5"

                        title="Food Festival"

                        class="event-img"

                        ondblclick="enlargeImage(this)">

                </td>

                <td>

                    <img src="https://images.pexels.com/photos/976866/pexels-photo-976866.jpeg"

                        alt="Event 6"

                        title="Charity Event"

                        class="event-img"

                        ondblclick="enlargeImage(this)">

                </td>

            </tr>

        </table>

    </section>

    <!-- Registration Form -->

    <section id="register" class="form-section">

        <h2>Event Registration</h2>

        <form>

            <input type="text"

                placeholder="Enter your name"

                required

                autofocus>

            <input type="email"

                placeholder="Enter your email"

                required>

            <input type="text"

                id="phone"

                placeholder="Enter phone number"

                onblur="validatePhone()">

            <input type="date"

                required>

            <select id="eventType"

                onchange="showFee()">

                <option value="">

                    Select Event

                </option>

                <option value="Music">

                    Music

                </option>

                <option value="Sports">

                    Sports

                </option>

                <option value="Workshop">

                    Workshop

                </option>

            </select>

            <p id="fee"></p>

            <textarea id="feedback"

                placeholder="Enter feedback"

                onkeyup="countChars()"></textarea>

            <p id="charCount">

                Characters: 0

            </p>

            <textarea

                placeholder="Message"></textarea>

            <button type="button"

                onclick="confirmSubmit()">

                Submit

            </button>

            <br><br>

            <output id="outputMsg"></output>

        </form>

    </section>

    <!-- Video Section -->

    <section class="video-section">

        <h2>Event Promo Video</h2>

        <video width="600"

            controls

            oncanplay="videoReady()">

            <source src="video/promo.mp4"

                type="video/mp4">

        </video>

    </section>

    <!-- Geolocation -->

    <section class="form-section">

        <h2>Find Nearby Events</h2>

        <button onclick="findLocation()">

            Find Nearby Events

        </button>

        <br><br>

        <p id="location"></p>

        <button onclick="clearPreferences()">

            Clear Preferences

        </button>

    </section>

    <!-- Footer -->

    <footer>

        <p>

            © 2026 Community Portal

        </p>

    </footer>

</body>

</html>
