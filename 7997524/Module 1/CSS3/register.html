<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Registration Form</h1>
    <form class="registration-form">
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
        </div>
        
        <label>Phone:</label>
<input type="text" id="phone"
onblur="validatePhone()"><br>

<label>Select Event:</label>

<select id="eventType" onchange="showFee()"><br>

<option value="">Select</option>
<option value="100">Music Festival</option>
<option value="150">Food Carnival</option>
<option value="200">Art Workshop</option>

</select>

<p id="fee"></p>

<label>Message:</label>

<textarea id="message"
onkeyup="countCharacters()"></textarea>

<button type="button"
onclick="submitForm()">

Register

</button>

</form>

</body>
</html>
